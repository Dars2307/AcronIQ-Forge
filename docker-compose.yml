services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./db/migrations/002_make_user_id_nullable.sql:/docker-entrypoint-initdb.d/002_make_user_id_nullable.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forge-network

  # API Server
  api-server:
    build:
      context: .
      target: api-server
      dockerfile: Dockerfile
    container_name: forge-api-server
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@postgres:5432/forge
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - ./apps/api-server/public/downloads:/app/public/downloads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/healthz', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - forge-network

  # Web App
  web-app:
    build:
      context: .
      target: web-app
      dockerfile: Dockerfile
    container_name: forge-web-app
    ports:
      - "80:80"
    depends_on:
      - api-server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - forge-network

  # Redis (for caching and sessions, optional)
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - forge-network

volumes:
  postgres_data:
  redis_data:

networks:
  forge-network:
    driver: bridge
