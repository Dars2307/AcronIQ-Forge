services:
  - type: web
    name: forge-api
    env: node
    rootDirectory: apps/api-server
    buildCommand: cd ../.. && pnpm install && cd apps/api-server && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
